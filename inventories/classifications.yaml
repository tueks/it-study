metadataOnly:
  authority: docs/02-taxonomy.md#62-tipos-de-contenido-o-entidades
  values:
    - value: brand
      description: Identidad comercial o institucional; nunca tipo principal de conocimiento.

priorities:
  authority: docs/03-content-model.md#171-prioridad
  values:
    - value: essential
      description: Necesario para el mapa mental básico o para comprender múltiples entradas.
    - value: important
      description: Comprensión frecuente o relación significativa.
    - value: specialized
      description: Contexto acotado de una disciplina.
    - value: emerging
      description: Candidato relevante cuya consolidación debe vigilarse.

knowledgeLevels:
  authority: docs/03-content-model.md#172-profundidad
  values:
    - value: recognition
      description: Identificación, tipo, dominio y problema general.
    - value: contextual-understanding
      description: Propósito, uso, participantes, relaciones, diferencias, ventajas y límites aplicables.
    - value: future-expanded-reference
      description: Ampliación futura; fuera de producción ordinaria del MVP.

stability:
  authority: docs/03-content-model.md#15-vigencia-y-estabilidad
  values:
    - value: stable-foundation
      description: Fundamento con cambios conceptuales infrecuentes.
    - value: slow-evolution
      description: Conocimiento de evolución gradual.
    - value: versioned-standard
      description: Especificación gobernada por versión.
    - value: changing-technology
      description: Tecnología con capacidades o terminología cambiantes.
    - value: changing-tool-product
      description: Herramienta, servicio o producto de cambio frecuente.
    - value: emerging
      description: Adopción o terminología todavía en consolidación.
    - value: deprecated
      description: Contenido retirado o superado.

