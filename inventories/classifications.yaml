# Vocabularios controlados de IT Study
#
# Artefacto de definición. Las descripciones son ayudas de validación y no sustituyen
# a los documentos de autoridad ni autorizan contenido o producción.
schemaVersion: "1.0"
authority:
  taxonomy: docs/02-taxonomy.md
  contentModel: docs/03-content-model.md
  relationships: docs/05-relationship-rules.md
  mvp: docs/07-mvp-definition.md
  batches: docs/08-production-batches.md
  quality: docs/09-quality-criteria.md
  decisions: docs/10-decision-log.md

families:
  authority: docs/03-content-model.md#10-modelos-por-familia-de-entidades
  values:
    - value: people-capabilities
      description: Personas, funciones y capacidades demostrables.
    - value: ideas-orientations
      description: Ideas, principios, orientaciones y modelos.
    - value: ways-of-working
      description: Sistemas, secuencias y formas recurrentes de realizar trabajo.
    - value: solutions-structures
      description: Soluciones recurrentes y organización arquitectónica.
    - value: specifications-implementations
      description: Reglas de interacción, especificaciones e implementaciones concretas.
    - value: results-measurement
      description: Resultados registrables, medición e interpretación.
    - value: accreditation-reference
      description: Credenciales y publicaciones de referencia.

entityTypes:
  authority: docs/03-content-model.md#10-modelos-por-familia-de-entidades
  values:
    - value: role
      family: people-capabilities
      description: Función contextual; no equivale a puesto.
    - value: position
      family: people-capabilities
      description: Designación organizacional que agrupa roles y responsabilidades.
    - value: competency
      family: people-capabilities
      description: Capacidad demostrable en contexto.
    - value: responsibility
      family: people-capabilities
      description: Obligación o resultado; ficha propia solo de forma excepcional.
    - value: concept
      family: ideas-orientations
      description: Idea con significado propio necesaria para comprender IT.
    - value: principle
      family: ideas-orientations
      description: Regla o proposición orientadora relativamente estable.
    - value: paradigm
      family: ideas-orientations
      description: Marco general para concebir o estructurar soluciones.
    - value: conceptual-orientation
      family: ideas-orientations
      description: Conjunto amplio de valores y supuestos; incluye filosofía.
    - value: model
      family: ideas-orientations
      description: Representación simplificada con propósito y límites.
    - value: methodology
      family: ways-of-working
      description: Sistema coherente de métodos, reglas y justificación.
    - value: work-framework
      family: ways-of-working
      description: Marco adaptable de roles, eventos, artefactos o reglas.
    - value: process
      family: ways-of-working
      description: Sistema de actividades con entradas, resultados y control.
    - value: practice
      family: ways-of-working
      description: Forma recurrente de realizar trabajo.
    - value: technique
      family: ways-of-working
      description: Procedimiento específico para una tarea.
    - value: pattern
      family: solutions-structures
      description: Solución general reutilizable a un problema recurrente.
      allowedSubtypes:
        - pattern
        - antipattern
    - value: architectural-style
      family: solutions-structures
      description: Restricciones y organización de alto nivel de un sistema.
    - value: protocol
      family: specifications-implementations
      description: Reglas de interacción e intercambio.
    - value: standard
      family: specifications-implementations
      description: Especificación publicada por un organismo o comunidad identificable.
    - value: technology
      family: specifications-implementations
      description: Capacidad técnica general; usar solo cuando no exista tipo más preciso.
    - value: tool
      family: specifications-implementations
      description: Implementación utilizada para ejecutar una tarea.
    - value: platform
      family: specifications-implementations
      description: Entorno integrado que ofrece capacidades a consumidores.
    - value: service
      family: specifications-implementations
      description: Capacidad ofrecida mediante interfaz o acuerdo.
    - value: product
      family: specifications-implementations
      description: Oferta gestionada a lo largo de un ciclo de vida.
    - value: artifact
      family: results-measurement
      description: Resultado tangible o registrable.
      allowedSubtypes:
        - reference-publication
    - value: metric
      family: results-measurement
      description: Regla de medición de una propiedad.
    - value: indicator
      family: results-measurement
      description: Interpretación de una o varias métricas para apoyar decisiones.
    - value: certification
      family: accreditation-reference
      description: Credencial emitida tras evaluar criterios definidos; emisor sujeto a decision-0014.

